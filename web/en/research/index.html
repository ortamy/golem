<script>
function toggleSidePanel() {
  document.getElementById('sidePanel').classList.toggle('open');
  document.getElementById('sidePanelOverlay').classList.toggle('show');
}

var RESEARCH_FILES = [];
fetch('../../files.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    RESEARCH_FILES = data;
    renderResearchList(RESEARCH_FILES);
  });

function renderResearchList(files) {
  var list = document.getElementById('research-list');
  list.innerHTML = '';
  files.forEach(function(f) {
    var a = document.createElement('a');
    a.className = 'research-item';
    a.href = 'javascript:void(0)';
    a.onclick = (function(p) { return function() { openResearchFile(p); }; })(f.path);
    var title = document.createElement('div');
    title.className = 'r-title';
    title.textContent = f.title;
    var cat = document.createElement('div');
    cat.className = 'r-cat';
    cat.textContent = f.category;
    var topic = document.createElement('div');
    topic.className = 'r-topic';
    topic.textContent = f.topic;
    a.appendChild(title);
    a.appendChild(cat);
    a.appendChild(topic);
    list.appendChild(a);
  });
}

function filterResearch() {
  var q = document.getElementById('research-search').value.toLowerCase();
  if (!q) { renderResearchList(RESEARCH_FILES); return; }
  var filtered = RESEARCH_FILES.filter(function(f) {
    return (f.title + ' ' + f.topic + ' ' + f.category).toLowerCase().indexOf(q) !== -1;
  });
  renderResearchList(filtered);
}

function backToList() {
  document.getElementById('research-content').style.display = 'none';
  document.getElementById('research-list').style.display = 'block';
  document.getElementById('research-search').style.display = 'block';
  document.getElementById('back-to-list').style.display = 'none';
  window.scrollTo(0, 0);
}

function openResearchFile(p) {
  var content = document.getElementById('research-content');
  var title = p.split('/').pop().replace('.md', '');
  content.innerHTML = '<div class="content"><h1>' + title + '</h1><div class="md-body">' + title + '</div></div>';
  content.style.display = 'block';
  document.getElementById('research-list').style.display = 'none';
  document.getElementById('research-search').style.display = 'none';
  document.getElementById('back-to-list').style.display = 'inline-block';
  window.scrollTo(0, 0);
  fetch('../../' + p)
    .then(function(r) { return r.text(); })
    .then(function(md) {
      var body = content.querySelector('.md-body');
      body.innerHTML = parseSimpleMD(md);
    })
    .catch(function() { content.querySelector('.md-body').innerHTML = '<p style="color:#c0392b">' + errLabel + '</p>'; });
}

function parseSimpleMD(t) {
  t = t.replace(/^#+ (.+)$/gm, '<h2>$1</h2>');
  t = t.replace(/\\*\\*(.+?)\\*\\*/g, '<strong>$1</strong>');
  t = t.replace(/\\*(.+?)\\*/g, '<em>$1</em>');
  t = t.replace(/`(.+?)`/g, '<code>$1</code>');
  t = t.replace(/\\n/g, '<br>');
  return t;
}
