  <div class="audio-bar">
    <span class="speak-indicator" id="indicator-all"></span>

  </footer>
</div>

<script src="../../js/burger-menu.js"></script>
<script src="../../js/navigation.js"></script>
<script>
// Аудио-озвучивание
const VERSE_TEXTS = {};
let currentUtterance = null;
let currentBtn = null;
let isSpeakingAll = false;

function speakHebrew(text, rate = 0.8) {
  return new Promise((resolve, reject) => {
    if (!('speechSynthesis' in window)) {
      alert('Ваш браузер не поддерживает Web Speech API');
      return reject();
    }
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'he-IL';
    utterance.rate = rate;
    utterance.pitch = 1;
    utterance.volume = 1;
    const voices = speechSynthesis.getVoices();
    const heVoice = voices.find(v => v.lang === 'he-IL' || v.lang === 'he');
    if (heVoice) utterance.voice = heVoice;
    utterance.onend = () => resolve();
    utterance.onerror = (e) => reject(e);
    speechSynthesis.speak(utterance);
  });
}

function setButtonState(btn, active) {
  if (!btn) return;
  btn.classList.toggle('speaking', active);
}

function setIndicatorActive(id, active) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('active', active);
}

async function speakVerse(btn, verseNum) {
  const text = VERSE_TEXTS[verseNum];
  if (!text) return;
  if (currentBtn === btn && !isSpeakingAll && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    setButtonState(btn, false);
    setIndicatorActive('indicator-all', false);
    currentBtn = null;
    return;
  }
  speechSynthesis.cancel();
  if (currentBtn) setButtonState(currentBtn, false);
  setIndicatorActive('indicator-all', false);
  currentBtn = btn;
  setButtonState(btn, true);
  try { await speakHebrew(text, 0.8); } catch (e) { console.error(e); }
  setButtonState(btn, false);
  currentBtn = null;
}

async function speakAll() {
  const btn = document.getElementById('btn-speak-all');
  if (isSpeakingAll && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    setButtonState(btn, false);
    setIndicatorActive('indicator-all', false);
    if (currentBtn) setButtonState(currentBtn, false);
    isSpeakingAll = false;
    currentBtn = null;
    return;
  }
  speechSynthesis.cancel();
  if (currentBtn) setButtonState(currentBtn, false);
  setButtonState(btn, false);
  setIndicatorActive('indicator-all', false);
  isSpeakingAll = true;
  setButtonState(btn, true);
  setIndicatorActive('indicator-all', true);
  const keys = Object.keys(VERSE_TEXTS).map(Number).sort((a, b) => a - b);
  for (const k of keys) {
    if (!isSpeakingAll) break;
    try { await speakHebrew(VERSE_TEXTS[k], 0.8); } catch (e) { console.error(e); break; }
  }
  setButtonState(btn, false);
  setIndicatorActive('indicator-all', false);
  if (currentBtn) setButtonState(currentBtn, false);
  isSpeakingAll = false;
  currentBtn = null;
}

if ('speechSynthesis' in window) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// Инициализация навигатора
document.addEventListener('DOMContentLoaded', () => {
  if (window.InterlinearNavigator) {
    window.interlinearNav = new InterlinearNavigator({
      container: '#interlinear-container',
      booksData: 'data/tanakh-books.json',
      cacheBase: 'data/tanakh-cache'
    });
    window.interlinearNav.init();
  }
});
</script>
