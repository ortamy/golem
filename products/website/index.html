<style>
  :root {
    --bg-primary: #17110d;
    --bg-secondary: #2a1f18;
    --bg-card: #33261e;
    --bg-dark: #2c1810;
    --bg-dark-hover: #3a2215;
    --text-primary: #e8dcc8;
    --text-secondary: #bfae96;
    --text-muted: #8a7a6a;
    --text-light: #ede0c8;
    --text-gold: #d4a030;
    --border-light: #4a382a;
    --border-dark: #4a3020;
    --border-gold: #b8860b;
    --accent-gold: #b8860b;
    --accent-gold-hover: #8b6508;
    --font-serif: 'EB Garamond', Georgia, 'Times New Roman', serif;
    --font-heading: 'Cormorant Garamond', Georgia, serif;
    --shadow-soft: 0 2px 12px rgba(0, 0, 0, 0.24);
    --transition: 0.2s ease;
  }
  *, *::before, *::after { box-sizing: border-box; }
  html { min-width: 320px; }
  body {
    position: relative;
    isolation: isolate;
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-serif);
    font-size: 18px;
    line-height: 1.8;
  }
  /* Тихая фактура продолжает пергаментный слой лаборатории. */
  body::before,
  body::after {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    content: '';
  }
  body::before {
    background:
      radial-gradient(ellipse at 20% 10%, rgba(184, 134, 11, 0.08), transparent 42%),
      radial-gradient(ellipse at 85% 85%, rgba(92, 48, 24, 0.2), transparent 45%);
  }
  body::after {
    opacity: 0.16;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.16'/%3E%3C/svg%3E");
  }
  .site-header {
    width: 100%;
    min-height: 56px;
    padding: 0 24px;
    background: var(--bg-dark);
    border-bottom: 1px solid var(--border-dark);
    box-shadow: var(--shadow-soft);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }
  .site-header h1 {
    display: flex;
    align-items: center;
    margin: 0;
    line-height: 1;
  }
  .site-logo {
    display: block;
    height: 40px;
    width: auto;
  }
  .language-panel {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 4px;
  }
  .lang-link {
    padding: 6px 10px;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--text-light);
    font-family: var(--font-serif);
    font-size: 14px;
    line-height: 1.3;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .lang-link.active {
    border-color: var(--border-gold);
    color: var(--text-gold);
    background: rgba(184, 134, 11, 0.12);
  }
  .lang-link[aria-disabled="true"] {
    color: var(--text-muted);
    cursor: default;
    opacity: 0.72;
  }
  .landing-main {
    display: flex;
    justify-content: center;
    width: 100%;
    padding: clamp(56px, 11vh, 112px) 24px 72px;
  }
  .hero-card {
    width: min(100%, 720px);
    padding: clamp(32px, 6vw, 64px) clamp(24px, 7vw, 72px);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    background: linear-gradient(145deg, rgba(51, 38, 30, 0.96), rgba(42, 31, 24, 0.96));
    box-shadow: 0 12px 42px rgba(0, 0, 0, 0.22), var(--shadow-soft);
    text-align: center;
  }
  .hero-mark {
    width: 48px;
    height: 1px;
    margin: 0 auto 24px;
    background: var(--accent-gold);
  }
  .hero-title {
    margin: 0 0 10px;
    color: var(--text-gold);
    font-family: var(--font-heading);
    font-size: clamp(34px, 6vw, 48px);
    font-style: italic;
    font-weight: 600;
    line-height: 1.1;
  }
  .subtitle {
    margin: 0;
    color: var(--text-light);
    font-family: var(--font-heading);
    font-size: clamp(23px, 4vw, 30px);
    font-style: italic;
    line-height: 1.3;
  }
  .hero-description {
    max-width: 540px;
    margin: 24px auto 0;
    color: var(--text-secondary);
    font-size: 19px;
    line-height: 1.7;
  }
  .lab-cta {
    display: inline-block;
    min-height: 44px;
    margin-top: 32px;
    padding: 10px 22px;
    border: 1px solid var(--border-gold);
    border-radius: 6px;
    background: var(--accent-gold);
    color: #2c1810;
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-decoration: none;
    box-shadow: var(--shadow-soft);
    transition: background var(--transition), border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  }
  .lab-cta:hover {
    border-color: var(--accent-gold-hover);
    background: var(--accent-gold-hover);
    transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(0, 0, 0, 0.3);
  }
  .lab-cta:active {
    transform: translateY(1px);
    box-shadow: var(--shadow-soft);
  }
  .lab-cta:focus-visible,
  .lang-link:focus-visible {
    outline: 2px solid var(--text-gold);
    outline-offset: 3px;
  }
  @media (max-width: 560px) {
    .site-header {
      align-items: flex-start;
      padding: 10px 16px;
    }
    .language-panel {
      gap: 2px;
    }
    .lang-link {
      padding: 5px 7px;
      font-size: 12px;
    }
    .landing-main {
      padding: 32px 16px 48px;
    }
    .hero-card {
      padding: 32px 20px 36px;
    }
  }
  @media (prefers-reduced-motion: reduce) {
    .lab-cta { transition: none; }
  }
</style>

    Здесь нет веры. Есть только корни, образы и двери.</p>
    <a href="apps/researchlab/index.html" class="lab-cta">Исследовательская лаборатория</a>
  </section>
</main>
