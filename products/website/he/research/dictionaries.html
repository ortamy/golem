<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מילונים</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<link rel="stylesheet" href="../../style.css">
<style>
body { font-family: 'EB Garamond', 'Times New Roman', serif; font-size: 18px; line-height: 1.5; background: #ede0c8; color: #2c1810; margin: 0; padding-top: 56px; }
h1, h2, h3 { line-height: 1.2; }
.top-bar { position: fixed; top: 0; left: 0; right: 0; background: #2c1810; color: #ede0c8; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; z-index: 2001; border-bottom: 1px solid #4a3020; direction: rtl; }
.top-bar .logo a { color: #b8860b; text-decoration: none; font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-size: 20px; font-weight: 700; font-style: italic; letter-spacing: 4px; }
#page-view { max-width: 900px; margin: 0 auto; padding: 24px; }
#page-view h1 { text-align: center; font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-size: 36px; font-weight: 700; font-style: italic; color: #b8860b; margin: 0 0 8px 0; }
.site-footer { background: #2c1810; color: #8a7a6a; padding: 40px 24px 24px; text-align: center; margin-top: 60px; }
.footer-copy { font-size: 12px; letter-spacing: 2px; font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
@media (max-width:768px) { #page-view { padding: 16px; } }
</style>
</head>
<body>

<header class="top-bar">
  <div class="logo"><a href="index.html">גולם</a></div>
</header>

<div id="page-view">
  <h1>מילונים</h1>
  <p>מילונים של מונחים מפתח בתנ״ך</p>
</div>

<footer class="site-footer">
  <div class="footer-copy">פרויקט "גולם". שחזור האמת. יהוה אחד.</div>
</footer>

<script src="../../js/burger-menu.js"></script>
</body>
</html>
