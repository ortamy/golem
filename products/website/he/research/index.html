<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מחקר — גולם</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<link rel="stylesheet" href="../../style.css">
<style>
body { font-family: 'EB Garamond', 'Times New Roman', serif; font-size: 18px; line-height: 1.5; background: #ede0c8; color: #2c1810; margin: 0; padding-top: 56px; }
.top-bar { position: fixed; top: 0; left: 0; right: 0; background: #2c1810; color: #ede0c8; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; z-index: 2001; border-bottom: 1px solid #4a3020; direction: rtl; }
.top-bar .logo a { color: #b8860b; text-decoration: none; font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-size: 20px; font-weight: 700; font-style: italic; letter-spacing: 4px; }
.research-header { padding: 40px 24px 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
.research-header h1 { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-size: 36px; font-weight: 700; font-style: italic; color: #b8860b; margin-bottom: 8px; }
.research-header p { font-size: 16px; color: #5c4a3a; }
#research-search { width: 100%; max-width: 600px; padding: 10px 14px; font-family: 'EB Garamond', 'Times New Roman', serif; font-size: 16px; outline: none; border-radius: 4px; background: #faf3e0; border: 1px solid #d4c4a8; color: #2c1810; margin: 0 auto 20px; display: block; box-sizing: border-box; }
#research-search:focus { border-color: #b8860b; box-shadow: 0 0 0 2px rgba(184,134,11,0.2); }
.research-filters { max-width: 900px; margin: 0 auto 20px; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.research-filters select { padding: 8px 12px; font-family: 'EB Garamond', 'Times New Roman', serif; font-size: 14px; outline: none; border-radius: 4px; background: #faf3e0; border: 1px solid #d4c4a8; color: #2c1810; min-width: 180px; cursor: pointer; }
.research-filters select:focus { border-color: #b8860b; }
.research-counter { text-align: center; font-size: 13px; color: #8a7a6a; margin-bottom: 16px; letter-spacing: 1px; }
#research-list { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; }
.research-item { display: block; padding: 14px 0; border-bottom: 1px solid #d4c4a8; text-decoration: none; color: #2c1810; transition: background 0.2s, color 0.2s; }
.research-item:hover { color: #b8860b; }
.research-item .r-title { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-size: 18px; font-weight: 600; }
.research-item .r-cat { font-size: 11px; color: #b8860b; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.research-item .r-topic { font-size: 13px; color: #5c4a3a; margin-top: 2px; }
.site-footer { background: #2c1810; color: #8a7a6a; padding: 40px 24px 24px; text-align: center; }
.footer-copy { font-size: 12px; letter-spacing: 2px; font-family: 'Cormorant Garamond', 'Times New Roman', serif; }
@media (max-width:768px) { .research-header { padding: 24px 16px 12px; } .research-header h1 { font-size: 28px; } .research-filters { padding: 0 16px; } .research-filters select { min-width: 140px; font-size: 13px; } }
</style>
</head>
<body>

<header class="top-bar">
  <div class="logo"><a href="../index.html">גולם</a></div>
</header>

<div class="research-header">
  <h1>𐤎 מחקר</h1>
  <p>מאות מאמרים המשחזרים את המשמעות האמיתית של התנ״ך</p>
</div>

<input type="text" id="research-search" placeholder="חיפוש לפי שם, נושא או קטגוריה..." oninput="filterResearch()">

<div class="research-filters">
  <select id="filter-category" onchange="filterResearch()">
    <option value="">כל הקטגוריות</option>
  </select>
  <select id="filter-subcategory" onchange="filterResearch()">
    <option value="">כל תתי-הקטגוריות</option>
  </select>
</div>

<div class="research-counter" id="research-counter">טעינה…</div>
<div id="research-list"></div>

<footer class="site-footer">
  <div class="footer-copy">פרויקט "גולם". שחזור האמת. יהוה אחד.</div>
</footer>

<script src="../../js/burger-menu.js"></script>
<script src="../../js/parser.js"></script>
<script src="../../js/state.js"></script>
<script src="../../js/api.js"></script>
<script src="../../js/ui.js"></script>
<script src="../../app.js"></script>
</body>
</html>
