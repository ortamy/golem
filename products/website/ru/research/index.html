<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Исследования — Голем</title>
<link rel="icon" type="image/svg+xml" href="../../favicon.svg">
<link rel="stylesheet" href="../../style.css">
<style>
.top-bar { position: fixed; top: 0; left: 0; right: 0; background: #2c1810; color: #ede0c8; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 1px solid #4a3020; }
.top-bar .logo { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 20px; font-weight: 700; font-style: italic; color: #b8860b; letter-spacing: 4px; }
.top-bar .logo a { color: #b8860b; text-decoration: none; }
.top-bar nav { display: flex; gap: 20px; align-items: center; }
.top-bar nav a { font-family: 'EB Garamond', Georgia, serif; font-size: 14px; color: #ede0c8; text-decoration: none; letter-spacing: 1px; transition: color 0.3s; }
.top-bar nav a:hover { color: #b8860b; }
.lang-switcher select { background: #3a2215; color: #ede0c8; border: 1px solid #5c3a2a; border-radius: 4px; padding: 4px 8px; font-family: 'EB Garamond', Georgia, serif; font-size: 13px; cursor: pointer; outline: none; appearance: none; -webkit-appearance: none; min-width: 80px; }
.lang-switcher select:focus { border-color: #b8860b; }
.lang-switcher select option { background: #2c1810; color: #ede0c8; }
.lang-switcher select option:disabled { color: #5c4a3a; }
.site-footer { background: #2c1810; color: #8a7a6a; padding: 40px 24px 24px; text-align: center; }
.footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.footer-links a { color: #b8860b; text-decoration: none; font-size: 14px; letter-spacing: 1px; font-family: 'EB Garamond', Georgia, serif; border-bottom: 1px solid transparent; transition: border-color 0.3s; }
.footer-links a:hover { border-bottom-color: #b8860b; }
.footer-copy { font-size: 12px; letter-spacing: 2px; font-family: 'Cormorant Garamond', Georgia, serif; }
body { font-family: 'EB Garamond', Georgia, serif; font-size: 18px; line-height: 1.8; background: #ede0c8; color: #2c1810; margin: 0; padding-top: 56px; }
.research-header { padding: 40px 24px 20px; max-width: 1200px; margin: 0 auto; text-align: center; }
.research-header h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 36px; font-weight: 700; font-style: italic; color: #b8860b; margin-bottom: 8px; }
.research-header p { font-size: 16px; color: #5c4a3a; }
#research-search { width: 100%; max-width: 600px; padding: 10px 14px; font-family: 'EB Garamond', Georgia, serif; font-size: 16px; outline: none; border-radius: 4px; background: #faf3e0; border: 1px solid #d4c4a8; color: #2c1810; margin: 0 auto 20px; display: block; box-sizing: border-box; }
#research-search:focus { border-color: #b8860b; box-shadow: 0 0 0 2px rgba(184,134,11,0.2); }
.research-filters { max-width: 900px; margin: 0 auto 20px; padding: 0 24px; display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.research-filters select { padding: 8px 12px; font-family: 'EB Garamond', Georgia, serif; font-size: 14px; outline: none; border-radius: 4px; background: #faf3e0; border: 1px solid #d4c4a8; color: #2c1810; min-width: 180px; cursor: pointer; }
.research-filters select:focus { border-color: #b8860b; }
.research-counter { text-align: center; font-size: 13px; color: #8a7a6a; margin-bottom: 16px; letter-spacing: 1px; }
#research-list { max-width: 900px; margin: 0 auto; padding: 0 24px 60px; }
.research-item { display: block; padding: 14px 0; border-bottom: 1px solid #d4c4a8; text-decoration: none; color: #2c1810; transition: background 0.2s, color 0.2s; }
.research-item:hover { color: #b8860b; }
.research-item .r-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 18px; font-weight: 600; }
.research-item .r-cat { font-size: 11px; color: #b8860b; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.research-item .r-topic { font-size: 13px; color: #5c4a3a; margin-top: 2px; }
@media (max-width:768px) { .research-header { padding: 24px 16px 12px; } .research-header h1 { font-size: 28px; } .research-filters { padding: 0 16px; } .research-filters select { min-width: 140px; font-size: 13px; } }
</style>
</head>
<body>

<header class="top-bar">
  <div class="logo"><a href="../index.html">ГОЛЕМ</a></div>
  <nav>
    <a href="index.html">Исследования</a>
    <a href="../about/index.html">О проекте</a>
    <span class="lang-switcher">
      <select onchange="if(this.value) window.location.href=this.value;">
        <option value="" selected>RU</option>
        <option value="../../en/research/index.html">EN</option>
        <option value="../../he/research/index.html">HE</option>
        <option value="" disabled>ES (скоро)</option>
        <option value="" disabled>DE (скоро)</option>
        <option value="" disabled>FR (скоро)</option>
        <option value="" disabled>PT (скоро)</option>
        <option value="" disabled>AR (скоро)</option>
        <option value="" disabled>ZH (скоро)</option>
        <option value="" disabled>JA (скоро)</option>
        <option value="" disabled>KO (скоро)</option>
      </select>
    </span>
  </nav>
</header>

<div class="research-header">
  <h1>𐤎 Исследования</h1>
  <p>Сотни статей, восстанавливающих истинное значение ТаНаХа</p>
</div>

<input type="text" id="research-search" placeholder="Поиск по названию, теме или категории..." oninput="filterResearch()">

<div class="research-filters">
  <select id="filter-category" onchange="filterResearch()">
    <option value="">Все категории</option>
  </select>
  <select id="filter-subcategory" onchange="filterResearch()">
    <option value="">Все подкатегории</option>
  </select>
</div>

<div class="research-counter" id="research-counter">Загрузка…</div>
<div id="research-list"></div>

<footer class="site-footer">
  <div class="footer-links">
    <a href="../about/index.html">Манифест</a>
    <a href="index.html">Исследования</a>
    <a href="../../content/hebrew">Иврит</a>
    <a href="../about/index.html">О проекте</a>
    <a href="https://github.com/ortamy/golem">GitHub</a>
    <a href="#" onclick="alert('Скоро'); return false;">Войти</a>
  </div>
  <div class="footer-copy">Проект «Голем». Восстановление истины. Яхве один.</div>
</footer>

<script>
var RESEARCH_FILES = [];

fetch('../../files.json')
  .then(function(r) { return r.json(); })
  .then(function(data) {
    RESEARCH_FILES = data;
    buildFilters();
    renderResearchList(RESEARCH_FILES);
  });

function buildFilters() {
  var cats = {};
  RESEARCH_FILES.forEach(function(f) {
    var c = f.category || 'Без категории';
    if (!cats[c]) cats[c] = {};
    var s = f.subcategory || '';
    if (s) cats[c][s] = true;
  });
  var catSel = document.getElementById('filter-category');
  Object.keys(cats).sort().forEach(function(c) {
    var opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c + ' (' + RESEARCH_FILES.filter(function(f){return (f.category||'Без категории')===c;}).length + ')';
    catSel.appendChild(opt);
  });
}

function getSubcats(category) {
  var subs = {};
  RESEARCH_FILES.forEach(function(f) {
    if ((f.category || 'Без категории') === category && f.subcategory) {
      subs[f.subcategory] = true;
    }
  });
  return Object.keys(subs).sort();
}

function filterResearch() {
  var q = document.getElementById('research-search').value.toLowerCase().trim();
  var cat = document.getElementById('filter-category').value;
  var sub = document.getElementById('filter-subcategory').value;

  // Обновляем подкатегории
  var subSel = document.getElementById('filter-subcategory');
  var prevSub = subSel.value;
  subSel.innerHTML = '<option value="">Все подкатегории</option>';
  if (cat) {
    getSubcats(cat).forEach(function(s) {
      var opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      subSel.appendChild(opt);
    });
  }
  subSel.value = prevSub;

  var filtered = RESEARCH_FILES.filter(function(f) {
    if (q) {
      var text = (f.title + ' ' + f.topic + ' ' + f.category + ' ' + (f.subcategory || '')).toLowerCase();
      if (text.indexOf(q) === -1) return false;
    }
    if (cat && (f.category || 'Без категории') !== cat) return false;
    if (sub && (f.subcategory || '') !== sub) return false;
    return true;
  });

  renderResearchList(filtered);
}

function renderResearchList(files) {
  var list = document.getElementById('research-list');
  var counter = document.getElementById('research-counter');
  counter.textContent = 'Показано: ' + files.length + ' из ' + RESEARCH_FILES.length + ' статей';
  list.innerHTML = '';
  files.forEach(function(f) {
    var a = document.createElement('a');
    a.className = 'research-item';
    a.href = '../../index.html#open=' + encodeURIComponent(f.path);
    var title = document.createElement('div');
    title.className = 'r-title';
    title.textContent = f.title;
    var cat = document.createElement('div');
    cat.className = 'r-cat';
    cat.textContent = f.category + (f.subcategory ? ' → ' + f.subcategory : '');
    var topic = document.createElement('div');
    topic.className = 'r-topic';
    topic.textContent = f.topic;
    a.appendChild(title);
    a.appendChild(cat);
    a.appendChild(topic);
    list.appendChild(a);
  });
}
</script>

</body>
</html>
