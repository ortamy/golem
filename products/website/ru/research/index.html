<!DOCTYPE html>

<head>

<style>
body { font-family: 'EB Garamond', Georgia, serif; font-size: 18px; line-height: 1.5; background: #ede0c8; color: #2c1810; margin: 0; padding-top: 56px; }
h1, h2, h3 { line-height: 1.2; }
p, li, blockquote { line-height: 1.5; margin-bottom: 4px; }
ul { margin: 4px 0 8px 0; padding-left: 24px; }
li { margin-bottom: 2px; }
hr { border: none; height: 1px; margin: 12px 0; background: #d4c4a8; }
code { background: #faf3e0; padding: 2px 6px; border-radius: 3px; font-size: 15px; border: 1px solid #d4c4a8; }
blockquote { border-left: 3px solid #b8860b; padding-left: 16px; margin-left: 0; color: #5c4a3a; font-style: italic; }
img { max-width: 24px; height: auto; display: inline-block; vertical-align: middle; margin-right: 4px; }
.top-bar { position: fixed; top: 0; left: 0; right: 0; background: #2c1810; color: #ede0c8; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; z-index: 2001; border-bottom: 1px solid #4a3020; }
.top-bar .logo a { color: #b8860b; text-decoration: none; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 20px; font-weight: 700; font-style: italic; letter-spacing: 4px; }
#research-view { max-width: 900px; margin: 0 auto; padding: 24px; }
#research-view h1 { text-align: center; font-family: 'Cormorant Garamond', Georgia, serif; font-size: 36px; font-weight: 700; font-style: italic; color: #b8860b; margin: 0 0 8px 0; }
#research-view > p { text-align: center; color: #5c4a3a; margin: 0 0 20px 0; }
#research-search { width: 100%; padding: 10px 14px; font-family: 'EB Garamond', Georgia, serif; font-size: 16px; border-radius: 4px; background: #faf3e0; border: 1px solid #d4c4a8; color: #2c1810; margin-bottom: 12px; display: block; box-sizing: border-box; }
#research-search:focus { border-color: #b8860b; }
.research-filters { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-bottom: 12px; }
.research-filters select { padding: 8px 12px; font-family: 'EB Garamond', Georgia, serif; font-size: 14px; border-radius: 4px; background: #faf3e0; border: 1px solid #d4c4a8; color: #2c1810; min-width: 180px; }
.research-filters select:focus { border-color: #b8860b; }
#research-counter { text-align: center; font-size: 13px; color: #8a7a6a; margin-bottom: 16px; }
#research-list { display: flex; flex-direction: column; }
.research-item { display: block; padding: 10px 0; border-bottom: 1px solid #d4c4a8; text-decoration: none; color: #2c1810; }
.research-item:hover { color: #b8860b; }
.research-item .r-title { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 18px; font-weight: 600; }
.research-item .r-cat { font-size: 11px; color: #b8860b; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.research-item .r-topic { font-size: 13px; color: #5c4a3a; margin-top: 2px; }
#file-view { max-width: 800px; margin: 0 auto; padding: 24px; }
#file-view h1 { font-family: 'Cormorant Garamond', Georgia, serif; font-size: 36px; font-weight: 700; font-style: italic; color: #b8860b; margin: 0 0 8px 0; }
#file-view h2 { font-size: 28px; color: #b8860b; margin: 24px 0 4px 0; }
#file-view h3 { font-size: 22px; color: #2c1810; margin: 16px 0 4px 0; }
#back-to-list { margin: 0 0 16px 24px; padding: 8px 16px; background: transparent; color: #b8860b; border: 1px solid #b8860b; border-radius: 4px; cursor: pointer; font-family: 'EB Garamond', Georgia, serif; font-size: 14px; }
#back-to-list:hover { background: rgba(184,134,11,0.1); }
.site-footer { background: #2c1810; color: #8a7a6a; padding: 40px 24px 24px; text-align: center; margin-top: 60px; }
.footer-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; }
.footer-links a { color: #b8860b; text-decoration: none; font-size: 14px; letter-spacing: 1px; font-family: 'EB Garamond', Georgia, serif; }
.footer-links a:hover { text-decoration: underline; }
.footer-copy { font-size: 12px; letter-spacing: 2px; font-family: 'Cormorant Garamond', Georgia, serif; }
@media (max-width:768px) { #research-view { padding: 16px; } #file-view { padding: 16px; } }
</style>
</head>
<body>

<header class="top-bar">
  <div class="logo"><a href="../index.html">ГОЛЕМ</a></div>
  <div class="hamburger-btn" onclick="toggleSidePanel()"><span></span><span></span><span></span></div>
</header>

<button id="back-to-list" onclick="backToList()" style="display:none;">← Назад к списку</button>

<div id="research-view">
  <h1>Исследования</h1>
  <p>Сотни статей, восстанавливающих истинное значение ТаНаХа</p>
  <input type="text" id="research-search" placeholder="Поиск по названию, теме или категории..." oninput="filterResearch()">
  <div class="research-filters">
    <select id="filter-category" onchange="filterResearch()"><option value="">Все категории</option></select>
    <select id="filter-subcategory" onchange="filterResearch()"><option value="">Все подкатегории</option></select>
  </div>
  <div id="research-counter">Загрузка…</div>
  <div id="research-list"></div>
</div>

<div id="file-view" style="display:none;"></div>

<footer class="site-footer">
  <div class="footer-links">
    <a href="../about/index.html">Манифест</a>
    <a href="index.html">Исследования</a>
    <a href="../../content/hebrew">Иврит</a>
    <a href="../about/index.html">О проекте</a>
    <a href="https://github.com/ortamy/golem">GitHub</a>
  </div>
  <div class="footer-copy">Проект «Голем». Восстановление истины. Яхве один.</div>
</footer>

<div class="side-panel-overlay" id="sidePanelOverlay" onclick="toggleSidePanel()"></div>
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header"><span class="logo-text">ГОЛЕМ</span><button class="side-panel-close" onclick="toggleSidePanel()">✕</button></div>
  <div class="side-panel-links">
    <a href="../index.html">Главная</a><a href="index.html">Исследования</a><a href="methods.html">Методы разоблачения</a><a href="dictionaries.html">Словари</a><a href="methodology.html">Методология</a><a href="../../content/hebrew">Иврит</a><a href="../about/index.html">О проекте</a>
  </div>
  <div class="side-panel-lang-switcher">
    <select onchange="if(this.value) window.location.href=this.value;">
      <option value="" selected>RU</option>
      <option value="../../en/research/index.html">EN</option>
      <option value="../../he/research/index.html">HE</option>
      <option value="" disabled>ES (скоро)</option>
      <option value="" disabled>DE (скоро)</option>
      <option value="" disabled>FR (скоро)</option>
      <option value="" disabled>PT (скоро)</option>
      <option value="" disabled>AR (скоро)</option>
      <option value="" disabled>ZH (скоро)</option>
      <option value="" disabled>JA (скоро)</option>
      <option value="" disabled>KO (скоро)</option>
    </select>
  </div>
</div>

<script>
function toggleSidePanel(){document.getElementById('sidePanel').classList.toggle('open');document.getElementById('sidePanelOverlay').classList.toggle('show');}
var RESEARCH_FILES=[];
fetch('../../files.json').then(function(r){return r.json()}).then(function(d){RESEARCH_FILES=d;buildFilters();checkUrl();});
function buildFilters(){var cats={};RESEARCH_FILES.forEach(function(f){var c=f.category||'Без категории';if(!cats[c])cats[c]={};var s=f.subcategory||'';if(s)cats[c][s]=true;});var s=document.getElementById('filter-category');Object.keys(cats).sort().forEach(function(c){var o=document.createElement('option');o.value=c;o.textContent=c+' ('+RESEARCH_FILES.filter(function(f){return(f.category||'Без категории')===c;}).length+')';s.appendChild(o);});}
function getSubcats(c){var subs={};RESEARCH_FILES.forEach(function(f){if((f.category||'Без категории')===c&&f.subcategory)subs[f.subcategory]=true;});return Object.keys(subs).sort();}
function filterResearch(){var q=document.getElementById('research-search').value.toLowerCase().trim();var cat=document.getElementById('filter-category').value;var sub=document.getElementById('filter-subcategory').value;var subSel=document.getElementById('filter-subcategory');var prev=subSel.value;subSel.innerHTML='<option value="">Все подкатегории</option>';if(cat){getSubcats(cat).forEach(function(s){var o=document.createElement('option');o.value=s;o.textContent=s;subSel.appendChild(o);});}subSel.value=prev;var filtered=RESEARCH_FILES.filter(function(f){if(q){var t=(f.title+' '+f.topic+' '+f.category+' '+(f.subcategory||'')).toLowerCase();if(t.indexOf(q)===-1)return false;}if(cat&&(f.category||'Без категории')!==cat)return false;if(sub&&(f.subcategory||'')!==sub)return false;return true;});renderList(filtered);}
function renderList(files){var l=document.getElementById('research-list');var c=document.getElementById('research-counter');c.textContent='Показано: '+files.length+' из '+RESEARCH_FILES.length+' статей';l.innerHTML='';files.forEach(function(f){var a=document.createElement('a');a.className='research-item';a.href='?file='+encodeURIComponent(f.path);var t=document.createElement('div');t.className='r-title';t.textContent=f.title;var cat=document.createElement('div');cat.className='r-cat';cat.textContent=f.category+(f.subcategory?' / '+f.subcategory:'');var tp=document.createElement('div');tp.className='r-topic';tp.textContent=f.topic;a.appendChild(t);a.appendChild(cat);a.appendChild(tp);l.appendChild(a);});}
function checkUrl(){var p=new URLSearchParams(window.location.search);var f=p.get('file');if(f){loadFileView(f);}else{document.getElementById('research-view').style.display='block';document.getElementById('back-to-list').style.display='none';renderList(RESEARCH_FILES);}}
function mdToHtml(md){var h=md;h=h.replace(/(\*\*Метаданные файла\*\*[\s\S]*?)(?=\n##|\n# )/,'');h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="../../$2" alt="$1">');;h=h.replace(/^---$/gm,'<hr>');h=h.replace(/^- (.+)$/gm,'<li>$1</li>');h=h.replace(/((?:<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*(.+?)\*/g,'<em>$1</em>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/^\> (.+)$/gm,'<blockquote>$1</blockquote>');h=h.replace(/\n\n+/g,'</p><p>');h=h.replace(/\n/g,'<br>');h='<p>'+h+'</p>';h=h.replace(/<p><\/p>/g,'');h=h.replace(/<p><br><\/p>/g,'');return h;}
function backToList(){document.getElementById('file-view').style.display='none';document.getElementById('back-to-list').style.display='none';document.getElementById('research-view').style.display='block';window.history.pushState({},'','index.html');window.scrollTo(0,0);}
window.addEventListener('popstate',function(){checkUrl();});
</script>
</body>
</html>
