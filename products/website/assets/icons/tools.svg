<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Toolbox background -->
  <rect x="12" y="20" width="40" height="32" fill="#faf3e0" stroke="#b8860b" stroke-width="2" rx="2"/>
  
  <!-- Toolbox lid -->
  <path d="M 12 20 L 20 12 L 44 12 L 52 20" fill="#faf3e0" stroke="#b8860b" stroke-width="2"/>
  
  <!-- Lock -->
  <rect x="28" y="24" width="8" height="6" fill="#b8860b" rx="1"/>
  <circle cx="32" cy="22" r="2" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  
  <!-- Tools inside -->
  <!-- Wrench -->
  <rect x="18" y="32" width="3" height="12" fill="#8a7a6a" rx="1"/>
  <circle cx="19.5" cy="30" r="2" fill="none" stroke="#8a7a6a" stroke-width="1.5"/>
  
  <!-- Screwdriver -->
  <rect x="43" y="34" width="3" height="10" fill="#c0392b" rx="1"/>
  <rect x="43" y="32" width="3" height="2" fill="#b8860b"/>
  
  <!-- Gear -->
  <circle cx="32" cy="42" r="5" fill="none" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="32" cy="42" r="2" fill="#b8860b"/>
  
  <!-- Decorative stars -->
  <text x="16" y="16" font-size="8" fill="#b8860b">✦</text>
  <text x="48" y="16" font-size="8" fill="#b8860b">✦</text>
</svg>