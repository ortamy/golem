<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Board background -->
  <rect x="8" y="12" width="48" height="40" fill="#faf3e0" stroke="#b8860b" stroke-width="2" rx="2"/>
  
  <!-- Red thread connecting cards -->
  <path d="M 20 20 Q 32 28 44 20" stroke="#c0392b" stroke-width="2" fill="none"/>
  <path d="M 20 32 Q 32 40 44 32" stroke="#c0392b" stroke-width="2" fill="none"/>
  <path d="M 20 44 Q 32 52 44 44" stroke="#c0392b" stroke-width="2" fill="none"/>
  
  <!-- Evidence cards -->
  <rect x="12" y="16" width="16" height="12" fill="#faf3e0" stroke="#d4c4a8" stroke-width="1" rx="1"/>
  <rect x="36" y="16" width="16" height="12" fill="#faf3e0" stroke="#d4c4a8" stroke-width="1" rx="1"/>
  <rect x="12" y="28" width="16" height="12" fill="#faf3e0" stroke="#d4c4a8" stroke-width="1" rx="1"/>
  <rect x="36" y="28" width="16" height="12" fill="#faf3e0" stroke="#d4c4a8" stroke-width="1" rx="1"/>
  <rect x="24" y="40" width="16" height="12" fill="#faf3e0" stroke="#d4c4a8" stroke-width="1" rx="1"/>
  
  <!-- Card numbers -->
  <circle cx="16" cy="20" r="3" fill="#c0392b"/>
  <text x="16" y="23" font-size="6" fill="#faf3e0" text-anchor="middle" font-weight="bold">1</text>
  
  <circle cx="44" cy="20" r="3" fill="#c0392b"/>
  <text x="44" y="23" font-size="6" fill="#faf3e0" text-anchor="middle" font-weight="bold">2</text>
  
  <circle cx="16" cy="32" r="3" fill="#c0392b"/>
  <text x="16" y="35" font-size="6" fill="#faf3e0" text-anchor="middle" font-weight="bold">3</text>
  
  <circle cx="44" cy="32" r="3" fill="#c0392b"/>
  <text x="44" y="35" font-size="6" fill="#faf3e0" text-anchor="middle" font-weight="bold">4</text>
  
  <circle cx="32" cy="44" r="3" fill="#c0392b"/>
  <text x="32" y="47" font-size="6" fill="#faf3e0" text-anchor="middle" font-weight="bold">5</text>
  
  <!-- Magnifying glass -->
  <circle cx="52" cy="52" r="6" fill="none" stroke="#b8860b" stroke-width="2"/>
  <line x1="56" y1="56" x2="60" y2="60" stroke="#b8860b" stroke-width="2" stroke-linecap="round"/>
</svg>