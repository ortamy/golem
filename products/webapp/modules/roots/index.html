<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Корневой словарь — Golem Лаборатория</title>
<meta name="description" content="Словарь 150 корней иврита со значениями и примерами">
<link rel="icon" type="image/svg+xml" href="../../../website/favicon.svg">
<link rel="stylesheet" href="../../css/lab.css">
<style>
  .rd-wrap { max-width: 880px; margin: 0 auto; }
  .rd-wrap .back-link { display: inline-flex; align-items: center; gap: 4px; color: var(--accent-gold); text-decoration: none; font-size: 15px; margin-bottom: 16px; }
  .rd-wrap .back-link:hover { text-decoration: underline; }
  .rd-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
  .rd-stat { flex: 1; min-width: 120px; background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 4px; padding: 12px 16px; text-align: center; }
  .rd-stat .num { font-family: var(--font-heading); font-size: 28px; font-weight: 700; color: var(--accent-gold); }
  .rd-stat .label { font-size: 12px; color: var(--text-muted); margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .rd-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: 6px; padding: 20px; margin-bottom: 16px; transition: all 0.2s; }
  .rd-card:hover { border-color: var(--accent-gold); box-shadow: 2px 2px 12px var(--shadow-card-hover); }
  .rd-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .rd-card-header .root-heb { font-size: 32px; font-family: 'Times New Roman', serif; line-height: 1; }
  .rd-card-header .root-translit { font-family: monospace; font-size: 14px; color: var(--text-muted); }
  .rd-card-header .root-paleo { font-size: 24px; color: var(--accent-gold); letter-spacing: 2px; }
  .rd-card .meaning { font-size: 16px; line-height: 1.6; margin-bottom: 8px; }
  .rd-card .examples { font-size: 15px; color: var(--text-secondary); padding-left: 20px; list-style: circle; }
  .rd-card .examples li { margin-bottom: 4px; }
  .rd-spinner { display: none; text-align: center; padding: 40px; }
  .rd-spinner.show { display: block; }
  .rd-spinner .loader { border: 4px solid var(--border-light); border-top: 4px solid var(--accent-gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  .rd-spinner .spinner-text { font-size: 16px; color: var(--text-muted); font-style: italic; }
  .rd-count { font-size: 14px; color: var(--text-muted); margin-bottom: 16px; }
  .rd-pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
  .rd-page-btn { padding: 6px 14px; border: 1px solid var(--border-light); border-radius: 4px; background: var(--bg-card); color: var(--text-primary); cursor: pointer; font-family: var(--font-serif); font-size: 14px; transition: all 0.2s; }
  .rd-page-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
  .rd-page-btn.active { background: var(--accent-gold); color: #faf3e0; border-color: var(--accent-gold); }
  .rd-page-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<div class="rd-wrap">

  <a href="../../index.html" class="back-link">← Назад в лабораторию</a>

  <h1>📖 Корневой словарь</h1>
  <p class="subtitle">Поиск по 150 корням иврита. Введите корень, слово или значение.</p>

  <div class="search-wrap">
    <input type="text" id="rd-search" class="lab-input" placeholder="Поиск: אמן, AMN, верить, истина..." oninput="RootsSearch.filter(this.value)" autofocus />
  </div>

  <div class="rd-stats">
    <div class="rd-stat"><div class="num" id="rd-total">150</div><div class="label">Корней</div></div>
    <div class="rd-stat"><div class="num" id="rd-found">0</div><div class="label">Найдено</div></div>
  </div>

  <div id="rd-spinner" class="rd-spinner show">
    <div class="loader"></div>
    <div class="spinner-text">Загрузка словаря…</div>
  </div>

  <div id="rd-list"></div>
  <div id="rd-pagination" class="rd-pagination"></div>
  <div id="rd-empty" class="lab-alert lab-alert-info" style="display:none;">Ничего не найдено. Попробуйте другой запрос.</div>

</div>

<script>
// ===== КОРНЕВОЙ СЛОВАРЬ — СТРАНИЦА =====
(function() {
  'use strict';

  const PER_PAGE = 20;
  let allRoots = [];
  let filtered = [];
  let currentPage = 1;

  function init() {
    fetch('../../data/roots.json')
      .then(r => r.json())
      .then(data => {
        allRoots = data;
        document.getElementById('rd-total').textContent = allRoots.length;
        document.getElementById('rd-spinner').classList.remove('show');
        filtered = allRoots.slice();
        render();
      })
      .catch(err => {
        console.error(err);
        document.getElementById('rd-spinner').innerHTML = '<div class="lab-alert lab-alert-error">Ошибка загрузки словаря.</div>';
      });
  }

  function filter(query) {
    query = query.trim().toLowerCase();
    if (!query) {
      filtered = allRoots.slice();
    } else {
      filtered = allRoots.filter(r => {
        return r.root.indexOf(query) !== -1 ||
               r.translit.toLowerCase().indexOf(query) !== -1 ||
               r.meaning.toLowerCase().indexOf(query) !== -1 ||
               (r.examples && r.examples.some(ex => ex.toLowerCase().indexOf(query) !== -1));
      });
    }
    currentPage = 1;
    document.getElementById('rd-found').textContent = filtered.length;
    render();
  }

  function render() {
    const list = document.getElementById('rd-list');
    const empty = document.getElementById('rd-empty');
    const pagination = document.getElementById('rd-pagination');

    if (filtered.length === 0) {
      list.innerHTML = '';
      pagination.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    const start = (currentPage - 1) * PER_PAGE;
    const pageItems = filtered.slice(start, start + PER_PAGE);

    let html = '';
    pageItems.forEach(r => {
      let paleoLetters = '';
      for (let ch of r.root) {
        paleoLetters += getPaleoSymbol(ch) + ' ';
      }

      html += '<div class="rd-card">';
      html += '  <div class="rd-card-header">';
      html += '    <span class="root-heb">' + r.root + '</span>';
      html += '    <span class="root-translit">' + r.translit + '</span>';
      html += '    <span class="root-paleo">' + paleoLetters.trim() + '</span>';
      html += '  </div>';
      html += '  <div class="meaning"><strong>Значение:</strong> ' + r.meaning + '</div>';
      if (r.examples && r.examples.length > 0) {
        html += '  <ul class="examples">';
        r.examples.forEach(ex => {
          html += '<li>' + ex + '</li>';
        });
        html += '  </ul>';
      }
      html += '</div>';
    });

    list.innerHTML = html;

    // Пагинация
    let pHtml = '';
    if (totalPages > 1) {
      pHtml += '<button class="rd-page-btn" onclick="RootsSearch.goTo(' + (currentPage - 1) + ')" ' + (currentPage <= 1 ? 'disabled' : '') + '>←</button>';
      for (let i = 1; i <= totalPages; i++) {
        pHtml += '<button class="rd-page-btn' + (i === currentPage ? ' active' : '') + '" onclick="RootsSearch.goTo(' + i + ')">' + i + '</button>';
      }
      pHtml += '<button class="rd-page-btn" onclick="RootsSearch.goTo(' + (currentPage + 1) + ')" ' + (currentPage >= totalPages ? 'disabled' : '') + '>→</button>';
    }
    pagination.innerHTML = pHtml;
  }

  function goTo(page) {
    const totalPages = Math.ceil(filtered.length / PER_PAGE);
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    render();
    document.getElementById('rd-list').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Палео-символы для букв
  function getPaleoSymbol(ch) {
    const map = {
      'א': '𐤀', 'ב': '𐤁', 'ג': '𐤂', 'ד': '𐤃', 'ה': '𐤄', 'ו': '𐤅', 'ז': '𐤆', 'ח': '𐤇',
      'ט': '𐤈', 'י': '𐤉', 'כ': '𐤊', 'ך': '𐤊', 'ל': '𐤋', 'מ': '𐤌', 'ם': '𐤌', 'נ': '𐤍',
      'ן': '𐤍', 'ס': '𐤎', 'ע': '𐤏', 'פ': '𐤐', 'ף': '𐤐', 'צ': '𐤑', 'ץ': '𐤑', 'ק': '𐤒',
      'ר': '𐤓', 'ש': '𐤔', 'ת': '𐤕'
    };
    return map[ch] || ch;
  }

  window.RootsSearch = { filter, goTo };
  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
